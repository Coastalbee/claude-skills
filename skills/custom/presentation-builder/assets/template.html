<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presentation Title</title>
<!-- FONTS: Replace with your chosen Google Fonts pairing -->
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Newsreader:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ============================================
     DESIGN TOKENS — Customize per presentation
     ============================================ */
  :root {
    /* Backgrounds */
    --bg: #08080a;
    --surface: #111114;
    --surface-2: #19191d;
    --border: #25252b;

    /* Text */
    --text: #f5f5f7;
    --text-muted: #9898a0;
    --text-dim: #606068;

    /* Accent — CHANGE THIS per presentation */
    --accent: #FF4D4D;
    --accent-glow: rgba(255, 77, 77, 0.12);

    /* Supporting colors (optional) */
    --secondary: #6c31e3;
    --secondary-glow: rgba(108, 49, 227, 0.12);
    --tertiary: #CC7B4A;
    --tertiary-glow: rgba(204, 123, 74, 0.12);
    --green: #22c55e;
    --blue: #4285f4;
  }

  /* ============================================
     BASE
     ============================================ */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; scroll-snap-type: y mandatory; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    overflow-x: hidden;
  }

  .slide {
    min-height: 100vh;
    scroll-snap-align: start;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 60px 80px;
    position: relative;
    overflow: hidden;
  }

  .slide-content {
    max-width: 1000px;
    width: 100%;
  }

  /* ============================================
     SLIDE COUNTER
     ============================================ */
  .slide-num {
    position: absolute;
    top: 32px;
    right: 40px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  /* ============================================
     NAVIGATION DOTS
     ============================================ */
  .nav-dots {
    position: fixed;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 12px;
    z-index: 100;
  }
  .nav-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
    opacity: 0.3;
    cursor: pointer;
    transition: all 0.3s;
  }
  .nav-dot.active {
    opacity: 1;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent-glow);
  }

  /* ============================================
     TYPOGRAPHY
     ============================================ */
  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
  }

  h1 {
    font-size: 72px;
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -3px;
  }

  h2 {
    font-size: 44px;
    font-weight: 700;
    letter-spacing: -1.5px;
    margin-bottom: 40px;
    line-height: 1.15;
  }

  .highlight { color: var(--accent); }

  .subtitle {
    font-family: 'Newsreader', serif;
    font-style: italic;
    font-size: 22px;
    color: var(--text-muted);
  }

  /* ============================================
     TITLE SLIDE
     ============================================ */
  .slide-title { text-align: center; }
  .slide-title h1 { margin-bottom: 20px; }
  .slide-title .subtitle { margin-bottom: 40px; }
  .slide-title .divider {
    width: 48px;
    height: 3px;
    background: var(--accent);
    margin: 0 auto 20px;
    border-radius: 2px;
  }
  .slide-title .author {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--text-dim);
  }
  .slide-title::before {
    content: '';
    position: absolute;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  /* ============================================
     QUOTE / STATEMENT SLIDE
     ============================================ */
  .big-quote {
    font-size: 42px;
    font-weight: 700;
    line-height: 1.3;
    letter-spacing: -1.5px;
    max-width: 800px;
    text-align: center;
  }
  .big-quote em {
    font-family: 'Newsreader', serif;
    color: var(--accent);
    font-style: italic;
  }
  .subtext {
    font-size: 18px;
    color: var(--text-muted);
    margin-top: 24px;
    text-align: center;
    max-width: 600px;
  }

  /* ============================================
     CONTENT GRID (CARDS)
     ============================================ */
  .file-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .file-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    transition: border-color 0.2s;
  }
  .file-card:hover { border-color: #3a3a42; }
  .file-card.primary {
    grid-column: 1 / -1;
    border-color: var(--accent);
    background: linear-gradient(135deg, var(--accent-glow), transparent);
  }
  .file-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .file-card.primary .file-name { font-size: 20px; }
  .file-desc { font-size: 14px; color: var(--text-muted); line-height: 1.5; }
  .file-card.primary .file-desc { font-size: 16px; }
  .file-badge {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 3px 8px;
    border-radius: 4px;
    background: var(--accent-glow);
    color: var(--accent);
    margin-top: 8px;
  }

  /* ============================================
     COMPARISON (TWO COLUMNS)
     ============================================ */
  .comparison {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }
  .compare-col {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
  }
  .compare-col.old { opacity: 0.5; border-style: dashed; }
  .compare-col.new {
    border-color: var(--green);
    background: linear-gradient(135deg, rgba(34, 197, 94, 0.04), transparent);
  }
  .compare-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .compare-col.old .compare-label { color: var(--text-dim); }
  .compare-col.new .compare-label { color: var(--green); }
  .compare-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
  .compare-list li {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.4;
    padding-left: 20px;
    position: relative;
  }
  .compare-list li::before {
    content: '×';
    position: absolute;
    left: 0;
    color: var(--text-dim);
    font-weight: 700;
  }
  .compare-col.new .compare-list li::before { content: '✓'; color: var(--green); }

  /* ============================================
     FOLDER TREE
     ============================================ */
  .folder-tree {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px 40px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    line-height: 2;
    color: var(--text-muted);
    max-width: 700px;
  }
  .folder-tree .folder { color: var(--text); font-weight: 600; }
  .folder-tree .system-file { color: var(--accent); }
  .folder-tree .comment { color: var(--text-dim); font-size: 12px; }
  .folder-tree .indent { padding-left: 24px; }
  .folder-tree .indent-2 { padding-left: 48px; }

  /* ============================================
     DIAGRAM (MACHINES / MULTI-ELEMENT)
     ============================================ */
  .machines-diagram {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 40px;
    margin-top: 40px;
  }
  .machine-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px 40px;
    width: 320px;
    text-align: center;
  }
  .machine-icon { font-size: 48px; margin-bottom: 12px; }
  .machine-name { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .machine-desc { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
  .machine-tools {
    margin-top: 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
  }
  .machine-tool {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 4px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text-dim);
  }
  .bridge-arrow {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .bridge-line {
    width: 80px;
    height: 2px;
    background: linear-gradient(90deg, var(--secondary), var(--accent));
  }
  .bridge-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--secondary);
    text-align: center;
  }

  /* ============================================
     PLUGIN / FEATURE CARDS
     ============================================ */
  .plugin-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-top: 32px;
  }
  .plugin-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
  }
  .plugin-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 600;
    color: var(--secondary);
    margin-bottom: 8px;
  }
  .plugin-desc { font-size: 14px; color: var(--text-muted); line-height: 1.5; }
  .warning-box {
    grid-column: 1 / -1;
    background: linear-gradient(135deg, var(--secondary-glow), transparent);
    border: 1px solid var(--secondary);
    border-radius: 12px;
    padding: 24px 28px;
    display: flex;
    align-items: flex-start;
    gap: 16px;
  }
  .warning-icon { font-size: 24px; flex-shrink: 0; }
  .warning-text { font-size: 15px; color: var(--text-muted); line-height: 1.6; }
  .warning-text strong { color: var(--secondary); }

  /* ============================================
     STATS / RESULTS
     ============================================ */
  .results-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-top: 32px;
  }
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    text-align: center;
  }
  .result-emoji { font-size: 32px; margin-bottom: 12px; }
  .result-stat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .result-label { font-size: 13px; color: var(--text-muted); }
  .results-list {
    margin-top: 32px;
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 700px;
  }
  .results-list li {
    font-size: 16px;
    color: var(--text-muted);
    line-height: 1.4;
    padding: 12px 20px;
    background: var(--surface);
    border-radius: 8px;
    border-left: 3px solid var(--accent);
  }

  /* ============================================
     STEPS / NUMBERED LIST
     ============================================ */
  .steps-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-top: 32px;
    max-width: 700px;
  }
  .step-item {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    padding: 20px 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
  }
  .step-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px;
    font-weight: 700;
    color: var(--accent);
    flex-shrink: 0;
    width: 40px;
  }
  .step-text { font-size: 16px; line-height: 1.5; }
  .step-text strong { color: var(--text); }
  .step-text span { color: var(--text-muted); }

  /* ============================================
     CTA / CLOSING
     ============================================ */
  .slide-cta { text-align: center; }
  .slide-cta h2 {
    font-size: 52px;
    font-weight: 800;
    letter-spacing: -2px;
    margin-bottom: 20px;
  }
  .cta-sub {
    font-family: 'Newsreader', serif;
    font-style: italic;
    font-size: 20px;
    color: var(--text-muted);
    margin-bottom: 40px;
  }
  .cta-links { display: flex; gap: 16px; justify-content: center; }
  .cta-link {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    padding: 14px 28px;
    border-radius: 8px;
    text-decoration: none;
    transition: all 0.2s;
  }
  .cta-link.primary { background: var(--accent); color: #000; font-weight: 600; }
  .cta-link.primary:hover { box-shadow: 0 0 30px var(--accent-glow); transform: translateY(-2px); }
  .cta-link.secondary { border: 1px solid var(--border); color: var(--text-muted); }
  .cta-link.secondary:hover { border-color: var(--text-dim); color: var(--text); }
  .author-line {
    margin-top: 48px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--text-dim);
  }

  /* ============================================
     TAGS
     ============================================ */
  .tags-row {
    margin-top: 32px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 6px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text-muted);
  }

  /* ============================================
     ANIMATIONS
     ============================================ */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate { opacity: 0; }
  .animate.visible { animation: fadeUp 0.6s ease forwards; }
  .delay-1 { animation-delay: 0.1s; }
  .delay-2 { animation-delay: 0.2s; }
  .delay-3 { animation-delay: 0.3s; }
  .delay-4 { animation-delay: 0.4s; }
</style>
</head>

<script>
  // Generate nav dots
  const slides = document.querySelectorAll('.slide');
  const dotsContainer = document.getElementById('navDots');
  slides.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'nav-dot';
    dot.addEventListener('click', () => {
      slides[i].scrollIntoView({ behavior: 'smooth' });
    });
    dotsContainer.appendChild(dot);
  });

  // Intersection observer for animations + active dot
  const dots = document.querySelectorAll('.nav-dot');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.querySelectorAll('.animate').forEach(el => {
          el.classList.add('visible');
        });
        const index = [...slides].indexOf(entry.target);
        dots.forEach((d, i) => d.classList.toggle('active', i === index));
      }
    });
  }, { threshold: 0.5 });

  slides.forEach(slide => observer.observe(slide));

  // Keyboard navigation
  document.addEventListener('keydown', (e) => {
    const current = [...slides].findIndex(s => {
      const rect = s.getBoundingClientRect();
      return rect.top >= -100 && rect.top <= window.innerHeight / 2;
    });

    if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
      e.preventDefault();
      if (current < slides.length - 1) slides[current + 1].scrollIntoView({ behavior: 'smooth' });
    }
    if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
      e.preventDefault();
      if (current > 0) slides[current - 1].scrollIntoView({ behavior: 'smooth' });
    }
  });
</script>

</body>
</html>
